name: validate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install actionlint
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION=v1.7.12
          curl -fsSLo actionlint.tgz "https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION#v}_linux_amd64.tar.gz"
          tar -xzf actionlint.tgz actionlint

      - name: Python syntax check
        run: python -m py_compile scripts/write_issue_report.py tests/test_write_issue_report.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Lint GitHub Actions workflows
        run: ./actionlint -shellcheck= .github/workflows/*.yml
